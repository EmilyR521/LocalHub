<div class="card">
  <h2 class="card-title">{{ isEditMode ? 'Edit plant' : 'Add plant' }}</h2>
  <form (ngSubmit)="onSave()">
    <div class="field">
      <label for="plant-name">Common name</label>
      <input id="plant-name" type="text" [(ngModel)]="formName" name="formName" placeholder="e.g. Japanese maple" required />
    </div>
    <div class="field">
      <label for="plant-variety">Variety</label>
      <input id="plant-variety" type="text" [(ngModel)]="formVariety" name="formVariety" placeholder="e.g. Atropurpureum" />
    </div>
    <div class="field">
      <label for="plant-species">Species name</label>
      <input id="plant-species" type="text" [(ngModel)]="formSpeciesName" name="formSpeciesName" placeholder="e.g. Acer palmatum" />
    </div>
    <div class="field">
      <label for="plant-lifecycle">Lifecycle</label>
      <input id="plant-lifecycle" type="text" [(ngModel)]="formLifecycle" name="formLifecycle" placeholder="e.g. tree, perennial, annual, shrub, climber" />
    </div>
    <div class="field">
      <label for="plant-hardiness">Hardiness</label>
      <input id="plant-hardiness" type="text" [(ngModel)]="formHardiness" name="formHardiness" placeholder="e.g. hardy, half-hardy, tender" />
    </div>
    <div class="field">
      <label for="plant-watering">Watering</label>
      <input id="plant-watering" type="text" [(ngModel)]="formWatering" name="formWatering" placeholder="e.g. low, medium, high" />
    </div>
    <div class="field">
      <label for="plant-pruning">Pruning months</label>
      <input id="plant-pruning" type="text" [(ngModel)]="formPruningMonths" name="formPruningMonths" placeholder="e.g. Jul Aug" />
    </div>
    <div class="field">
      <label for="plant-sowing">Sowing months</label>
      <input id="plant-sowing" type="text" [(ngModel)]="formSowingMonths" name="formSowingMonths" placeholder="e.g. Mar Apr" />
    </div>
    <div class="field">
      <label for="plant-harvest">Harvest months</label>
      <input id="plant-harvest" type="text" [(ngModel)]="formHarvestMonths" name="formHarvestMonths" placeholder="e.g. Sep Oct" />
    </div>
    <div class="field">
      <label for="plant-planting-out">Planting-out months</label>
      <input id="plant-planting-out" type="text" [(ngModel)]="formPlantingOutMonths" name="formPlantingOutMonths" placeholder="e.g. Apr May" />
    </div>
    <div class="field">
      <label for="plant-ph">Preferred PH</label>
      <input id="plant-ph" type="text" [(ngModel)]="formPreferredPh" name="formPreferredPh" placeholder="e.g. slightly acidic to neutral" />
    </div>
    <div class="field">
      <label for="plant-image">Image URL</label>
      <input id="plant-image" type="url" [(ngModel)]="formImageUrl" name="formImageUrl" placeholder="https://..." />
    </div>
    <div class="field">
      <label for="plant-location">Location</label>
      <input id="plant-location" type="text" [(ngModel)]="formLocation" name="formLocation" placeholder="Where in the garden" />
    </div>
    <div class="field gardener-zone-field">
      <label for="plant-zone-search">Zones</label>
      <div class="plugin-actions gardener-zone-search-actions">
        <input
          id="plant-zone-search"
          type="text"
          [ngModel]="zoneSearchInput()"
          (ngModelChange)="zoneSearchInput.set($event)"
          name="zoneSearchInput"
          placeholder="Search and add zones..."
          (focus)="zoneSearchFocused.set(true)"
          (blur)="zoneSearchFocused.set(false)"
          (keydown.enter)="$event.preventDefault()"
        />
      </div>
      @if (zoneSearchFocused() && zonesToAdd().length > 0) {
        <ul class="gardener-zone-add-list">
          @for (z of zonesToAdd(); track z.id) {
            <li>
              <button type="button" class="gardener-zone-add-btn" (mousedown)="addZoneToForm(z); $event.preventDefault()">{{ z.name }}</button>
            </li>
          }
        </ul>
      }
      @if (formZonesForDisplay().length > 0) {
        <div class="plugin-list" style="margin-top: 0.5rem;">
          @for (zone of formZonesForDisplay(); track zone.id) {
            <span class="tag-chip">{{ zone.name }} <button type="button" class="tag-remove" (click)="removeZoneFromForm(zone.id)" aria-label="Remove zone">×</button></span>
          }
        </div>
      }
    </div>
    <div class="field">
      <label for="plant-notes">Notes</label>
      <textarea id="plant-notes" [(ngModel)]="formNotes" name="formNotes" rows="3" placeholder="Optional notes"></textarea>
    </div>
    <div class="panel-actions">
      <button type="submit" class="btn primary">Save</button>
      <button type="button" class="btn secondary" (click)="onCancel()">Cancel</button>
      @if (isEditMode) {
        <button type="button" class="btn secondary" (click)="onDelete()">Delete</button>
      }
    </div>
  </form>
</div>
